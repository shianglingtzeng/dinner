.flag{font-size:22px;vertical-align:middle;margin-right:6px;}

.error-icon{font-size:48px;margin-bottom:16px;}
.error-title{font-size:18px;font-weight:600;color:#EF4444;margin-bottom:8px;}
.error-msg{color:#6B7280;font-size:13px;line-height:1.6;}

  '沙烏地阿拉伯':'🇸🇦','馬來西亞':'🇲🇾','印度':'🇮🇳','日本':'🇯🇵',
  '韓國':'🇰🇷','加拿大':'🇨🇦','紐西蘭':'🇳🇿','帛琉':'🇵🇼',

  '澳門':'🇲🇴','香港':'🇭🇰','越南':'🇻🇳',
};

function getZoneClass(zone){
  if(zone.includes('A')) return 'zone-a';
  if(zone.includes('B')) return 'zone-b';
  return 'zone-c';
}

function render(g){
  const flag = FLAGS[g.country] || '🌐';
  const zoneClass = getZoneClass(g.zone);
  document.getElementById('card-body').innerHTML = `
    <div class="field">
      <div class="field-label">賓客姓名 / Guest</div>
      <div class="field-value large">${g.name}</div>
    </div>
    <div class="divider"></div>
    <div class="field">
      <div class="field-label">國別 / Country</div>
      <div class="field-value"><span class="flag">${flag}</span>${g.country || '—'}</div>
    </div>
    <div class="divider"></div>
    <div class="field">
      <div class="field-label">座位 / Seat</div>
      <div class="seat-badge">
        <span class="seat-zone ${zoneClass}">${g.zone}</span>
        <span class="seat-code">${g.seat}</span>
        <span class="seat-detail">第 ${g.row} 排 · 第 ${g.seat_num} 號</span>
      </div>
    </div>
  `;
}

function showError(seat){
  document.getElementById('card-body').innerHTML = `
    <div class="error-body">
      <div class="error-icon">🔍</div>
      <div class="error-title">找不到座位資料</div>
      <div class="error-msg">查無座位編號：<strong>${seat || '(未提供)'}</strong><br>請確認 QR Code 是否正確掃描</div>
      <div class="debug">URL: ${location.href}</div>
    </div>`;
}

// 解析 URL 參數（相容 hash 和 query string）
function getSeat(){
  // 先嘗試 ?seat=
  const p = new URLSearchParams(location.search);
  if(p.get('seat')) return p.get('seat');
  // 再嘗試 #seat=
  const h = new URLSearchParams(location.hash.replace('#',''));
  if(h.get('seat')) return h.get('seat');
  // 最後嘗試 hash 直接是座位編號
  if(location.hash && location.hash.length > 1) return location.hash.slice(1);
  return null;
}

const seat = getSeat();
if(seat){
  const guest = GUESTS.find(g => g.seat === seat);
  if(guest) render(guest);
  else showError(seat);
} else {
  showError(null);
}
